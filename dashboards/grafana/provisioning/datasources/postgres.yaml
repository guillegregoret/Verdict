# Datasource de Grafana → Postgres/TimescaleDB (§10).
# Credenciales interpoladas desde el entorno del contenedor (ver docker-compose).
# Usa el usuario de SOLO LECTURA (verdict_ro) — mínimo privilegio, §8.
apiVersion: 1

datasources:
  - name: Verdict Postgres
    uid: verdict-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: ${POSTGRES_RO_USER}
    database: ${POSTGRES_DB}
    isDefault: true
    editable: false
    secureJsonData:
      password: ${POSTGRES_RO_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1700
      timescaledb: true
