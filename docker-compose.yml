# ─────────────────────────────────────────────────────────────────────────────
# Portfolio Monitor & Alerting System — Docker Compose
#
# Monolito modular (app) + containers separados por dominio de falla.
# 🔴 READ-ONLY: la app solo observa y notifica. IB Gateway en READ_ONLY_API.
#
# Redes:
#   - internal (internal: true): data plane sin salida a internet.
#       postgres ↔ ib-gateway ↔ app ↔ grafana ↔ metabase ↔ uptime-kuma
#   - egress (bridge): salida a internet. Solo la usan `app` y `uptime-kuma`.
#       (La restricción fina a Finnhub/Anthropic/Telegram/EDGAR se hace en el
#        firewall del host — ver CLAUDE.md §8.)
# Los puertos publicados (grafana/kuma/metabase) se bindean a 127.0.0.1 y
# funcionan aunque su red sea `internal: true` (port-mapping no requiere egress).
# Ningún puerto sensible (postgres 5432, gateway 4001/4002) se publica al host.
# ─────────────────────────────────────────────────────────────────────────────

name: portfolio-monitor

services:
  # ── Base de datos: fuente de verdad (Postgres + TimescaleDB) ────────────────
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Migraciones: se ejecutan en orden alfabético SOLO en un volumen vacío.
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - internal                     # sin egress; nadie la alcanza desde afuera
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ── IB Gateway: posiciones + fundamentals. 🔴 READ_ONLY_API=yes ─────────────
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:10.30.1t
    restart: unless-stopped
    environment:
      TWS_USERID: ${TWS_USERID}
      TWS_PASSWORD: ${TWS_PASSWORD}
      TRADING_MODE: ${TRADING_MODE:-paper}
      READ_ONLY_API: ${READ_ONLY_API:-yes}       # 🔴 red de seguridad crítica
      AUTO_RESTART_TIME: ${IB_GATEWAY_AUTO_RESTART_TIME:-11:59 PM}
      TZ: ${TZ:-Europe/Rome}
    # Puertos 4001/4002 solo alcanzables dentro de la red `internal`.
    # NUNCA publicar 4001/4002 al host público.
    networks:
      - internal
    security_opt:
      - no-new-privileges:true

  # ── App: monolito modular (poller + trigger + reason + notify + sched) ──────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      ib-gateway:
        condition: service_started
    networks:
      - internal                     # → postgres, ib-gateway
      - egress                       # → Finnhub, Anthropic, Telegram, EDGAR/FMP
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

  # ── Uptime Kuma: monitoreo HTTP/TCP de APIs, gateway y app ──────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1.23.16
    restart: unless-stopped
    volumes:
      - kuma_data:/app/data
    ports:
      - "127.0.0.1:3001:3001"        # UI local; no exponer públicamente
    networks:
      - internal                     # → monitorea gateway/app/postgres
      - egress                       # → monitorea Finnhub/Anthropic/EODHD
    security_opt:
      - no-new-privileges:true

  # ── Grafana: dashboards infra + series de portfolio ─────────────────────────
  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Consumidos por el datasource provisionado (interpolación ${VAR}).
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboards/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"        # UI local; no exponer públicamente
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal                     # → lee de postgres (no necesita egress)
    security_opt:
      - no-new-privileges:true

  # ── Metabase (opcional): analítica exploratoria / Sankey ────────────────────
  # Levantar con:  docker compose --profile analytics up -d
  metabase:
    image: metabase/metabase:v0.51.8
    restart: unless-stopped
    profiles: ["analytics"]
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${POSTGRES_DB}
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal                     # → lee de postgres (no necesita egress)
    security_opt:
      - no-new-privileges:true

networks:
  internal:
    driver: bridge
    internal: true                   # data plane: sin salida a internet
  egress:
    driver: bridge                   # salida a internet (solo app + uptime-kuma)

volumes:
  pgdata:
  kuma_data:
  grafana_data:
